name: Windows Release

on:
  push:
    tags:
      - "v*"

env:
  VCPKG_DISABLE_METRICS: 1

jobs:
  build-release:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
          if (-not (Test-Path $vcpkgRoot)) {
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          }
          & (Join-Path $vcpkgRoot "bootstrap-vcpkg.bat") -disableMetrics
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: cmake --preset windows-msvc-release

      - name: Build release and deploy bundle
        shell: pwsh
        run: cmake --build --preset build-windows-release --target disassemble_desktop windows_deploy_check

      - name: Package release zip
        shell: pwsh
        run: |
          $zipName = "DisassembleImage-$env:GITHUB_REF_NAME-win64.zip"
          $zipPath = Join-Path $env:RUNNER_TEMP $zipName
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive `
            -Path build/windows-msvc-release/deploy/disassemble_desktop/* `
            -DestinationPath $zipPath `
            -CompressionLevel Optimal
          "RELEASE_ZIP=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.RELEASE_ZIP }}
          generate_release_notes: true
          make_latest: true
