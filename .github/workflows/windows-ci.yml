name: Windows CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  VCPKG_DISABLE_METRICS: 1

jobs:
  build-and-test:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
          if (-not (Test-Path $vcpkgRoot)) {
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          }
          & (Join-Path $vcpkgRoot "bootstrap-vcpkg.bat") -disableMetrics
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: cmake --preset windows-msvc-debug

      - name: Build desktop and smoke tests
        shell: pwsh
        run: cmake --build --preset build-windows-debug --target disassemble_desktop phase1_smoke phase2_smoke phase3_smoke phase4_smoke phase5_smoke

      - name: Run smoke tests
        shell: pwsh
        run: ctest --test-dir build/windows-msvc-debug --output-on-failure -L smoke -C Debug
